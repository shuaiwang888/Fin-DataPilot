name: Deploy Backend to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Skills/**"
      - ".github/workflows/deploy-backend-hf.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HF_SSH_PRIVATE_KEY }}
      - name: Add HF remote
        run: |
          git config user.email "ci@findatapilot.local"
          git config user.name "Fin-DataPilot CI"
          git remote add hf git@hf.co:spaces/appQQQ/FinDataPilot || true
      - name: Deploy
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ./deploy-to-hf.sh --message "ci: ${SHORT_SHA}"
