name: Deploy Backend to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Skills/**"
      - ".github/workflows/deploy-backend-hf.yml"
      - "deploy-to-hf.sh"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      # Write the SSH key from secrets to a file, then point git at it directly.
      # This avoids the webfactory/ssh-agent stdin-loading path that was failing
      # with "error in libcrypto" on some runners.
      - name: Install deploy key
        env:
          HF_SSH_PRIVATE_KEY: ${{ secrets.HF_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Normalise line endings (strip \r) and write the key
          printf '%s' "$HF_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Show the first and last non-empty line for debugging (no full key dump)
          head -1 ~/.ssh/deploy_key
          echo "---"
          grep -v '^$' ~/.ssh/deploy_key | tail -1
          # Configure git to use this key + accept new host
          git config --global core.sshCommand \
            "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
          echo "✓ deploy key installed"

      - name: Deploy
        env:
          # Pass HF_TOKEN through so deploy-to-hf.sh can use the HTTPS
          # path when SSH isn't available. Either secret works on its
          # own; if both are set, HF_TOKEN wins.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ./deploy-to-hf.sh --message "ci: ${SHORT_SHA}"
